<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motion Core: Architect</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --alert: #ff2a6d;
            --gold: #ffd700;
            --bg-glass: rgba(10, 15, 20, 0.65);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; overflow: hidden; background-color: #000; 
            font-family: 'Rajdhani', sans-serif; touch-action: none; 
            color: white; user-select: none;
        }
        
        #canvas-container { position: absolute; top: 0; left: 0; z-index: 1; width: 100vw; height: 100vh; }

        /* --- UI OVERLAY LAYER --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; box-sizing: border-box;
            background: radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.8) 100%);
        }

        /* --- HUD ELEMENTS --- */
        .hud-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-left: 3px solid var(--primary);
            padding: 15px; width: fit-content;
            border-radius: 0 10px 10px 0;
            transform: skewX(-10deg);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
            transition: all 0.3s ease;
        }

        .hud-text { transform: skewX(10deg); }
        .hud-label { color: #8a9ba8; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 2px;}
        .hud-value { color: white; font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; text-shadow: 0 0 10px var(--primary); }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
        .status-light { display: inline-block; width: 8px; height: 8px; background: #333; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 5px #333; }
        .status-light.active { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
        .status-light.searching { background: #ffaa00; animation: blink 1s infinite; }

        /* Bottom Bar */
        .bottom-bar { display: flex; flex-direction: column; align-items: center; width: 100%; padding-bottom: 30px; }
        
        #gesture-pill {
            background: rgba(0,0,0,0.8); border: 1px solid #333;
            padding: 10px 30px; border-radius: 30px;
            text-align: center; margin-bottom: 10px;
            transition: all 0.2s; opacity: 0.7;
        }
        #gesture-pill.active { border-color: var(--secondary); opacity: 1; box-shadow: 0 0 15px rgba(188, 19, 254, 0.3); }
        #gesture-text { font-size: 1rem; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; }

        .charge-container { width: 200px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; position: relative; }
        .charge-fill { 
            width: 0%; height: 100%; background: linear-gradient(90deg, var(--secondary), var(--alert));
            box-shadow: 0 0 10px var(--alert); transition: width 0.1s linear;
        }

        /* Decorative Corners */
        .reticle { position: absolute; width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.3); pointer-events: none; }
        .tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .tr { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        /* --- START SCREEN --- */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transition: opacity 0.6s ease-out;
        }

        h1 { font-size: 3.5rem; margin: 0; letter-spacing: 10px; color: white; text-transform: uppercase; font-weight: 300; }
        h1 span { color: var(--primary); font-weight: 700; text-shadow: 0 0 30px var(--primary); }
        
        .instruction-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin: 40px 0;
            text-align: center; max-width: 600px; width: 90%;
        }
        .inst-item { color: #888; font-size: 0.8rem; border: 1px solid #222; padding: 15px; border-radius: 8px; background: rgba(255,255,255,0.02); }
        .inst-item strong { display: block; color: var(--primary); font-size: 1rem; margin-bottom: 5px; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; align-items: center;}
        
        .btn-main {
            padding: 18px 60px; font-size: 1.2rem; font-family: 'Rajdhani', sans-serif; font-weight: 700;
            color: #000; background: var(--primary); border: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            clip-path: polygon(15% 0, 100% 0, 100% 70%, 85% 100%, 0 100%, 0 30%);
            transition: all 0.2s;
        }
        .btn-main:hover { background: white; box-shadow: 0 0 30px var(--primary); transform: scale(1.05); }
        
        .btn-sec {
            background: transparent; border: 1px solid #444; color: #888;
            padding: 10px 20px; cursor: pointer; font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;
        }
        .btn-sec:hover { color: white; border-color: white; }

        .spinner { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; display: none; margin-top: 20px;}
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <div>
            <h1>Motion <span>CORE</span></h1>
            <div style="width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); margin-top: 10px;"></div>
        </div>

        <div class="instruction-grid">
            <div class="inst-item"><strong>OPEN HAND</strong><span>ROTATE</span></div>
            <div class="inst-item"><strong>PINCH</strong><span>ZOOM</span></div>
            <div class="inst-item"><strong>HOLD FIST</strong><span>MORPH</span></div>
        </div>

        <div class="btn-group">
            <button id="btn-start" class="btn-main">INITIALIZE LINK</button>
            <button id="btn-touch" class="btn-sec">NO CAMERA? ENABLE TOUCH</button>
        </div>
        
        <div class="spinner" id="loader"></div>
        <div id="error-log" style="color:var(--alert); font-size:12px; margin-top:20px;"></div>
    </div>

    <div id="ui-layer">
        <div class="reticle tl"></div><div class="reticle tr"></div>
        <div class="reticle bl"></div><div class="reticle br"></div>

        <div class="top-bar">
            <div class="hud-panel">
                <div class="hud-text">
                    <span class="hud-label"><div id="status-dot" class="status-light"></div>SYSTEM STATUS</span>
                    <span id="ui-status" class="hud-value">STANDBY</span>
                </div>
            </div>
            
            <div class="hud-panel" style="border-left: none; border-right: 3px solid var(--secondary); transform: skewX(10deg); border-radius: 10px 0 0 10px;">
                <div class="hud-text" style="transform: skewX(-10deg); text-align: right;">
                    <span class="hud-label">TOPOLOGY</span>
                    <span id="ui-shape" class="hud-value" style="color:var(--secondary);">SPHERE</span>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <div id="gesture-pill">
                <div id="gesture-text">WAITING FOR INPUT</div>
            </div>
            <div class="charge-container">
                <div id="ui-charge" class="charge-fill"></div>
            </div>
        </div>
    </div>

    <video id="video-feed" playsinline style="display:none;"></video>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- ERROR HANDLING ---
        function logError(msg) {
            console.error(msg);
            const el = document.getElementById('error-log');
            if(el) el.innerText = "ERR: " + msg;
        }

        // --- 1. SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 24;

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); 
        container.appendChild(renderer.domElement);

        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.4, 0.6, 0.85);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- 2. ADVANCED SHAPE LOGIC ---
        const PARTICLE_COUNT = 9000;
        const geometry = new THREE.BufferGeometry();
        const pos = new Float32Array(PARTICLE_COUNT * 3);
        const target = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const randoms = new Float32Array(PARTICLE_COUNT);

        const colorCyan = new THREE.Color(0x00f3ff); 
        const colorPurple = new THREE.Color(0xbc13fe); 
        const colorGold = new THREE.Color(0xffaa00);
        const colorGreen = new THREE.Color(0x00ff66);

        // Helper for random between
        const rand = (min, max) => Math.random() * (max - min) + min;

        // --- SHAPE DEFINITIONS ---
        const shapes = [
            // 0. CORE SPHERE
            (i) => { 
                const r = 11; 
                const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                return { x: r * Math.cos(theta) * Math.sin(phi), y: r * Math.sin(theta) * Math.sin(phi), z: r * Math.cos(phi) };
            },
            // 1. QUANTUM CUBE (New)
            (i) => {
                const s = 14; 
                // Create a volume cube with concentrated edges
                const r = Math.random();
                let x,y,z;
                if(r < 0.2) { // 20% on edges for structure
                    x = (Math.random()>0.5?1:-1) * s/2; 
                    y = rand(-s/2, s/2); 
                    z = rand(-s/2, s/2);
                } else {
                    x = rand(-s/2, s/2); y = rand(-s/2, s/2); z = rand(-s/2, s/2);
                }
                return { x, y, z };
            },
            // 2. TORUS
            (i) => { 
                const u = Math.random() * Math.PI * 2;
                const v = Math.random() * Math.PI * 2;
                const r = 8 + 3 * Math.cos(v);
                return { x: r * Math.cos(u), y: r * Math.sin(u), z: 3 * Math.sin(v) };
            },
            // 3. NEON PYRAMID (New)
            (i) => {
                const h = 18; // Height
                const y = rand(-h/2, h/2); // Vertical position
                // Calculate max width at this height (linear interpolation)
                const pct = 1.0 - ((y + h/2) / h); 
                const w = pct * 12; // Base width
                
                return { 
                    x: rand(-w, w), 
                    y: y, 
                    z: rand(-w, w) 
                };
            },
            // 4. HELIX STRAND
            (i) => { 
                const t = (i / PARTICLE_COUNT) * Math.PI * 20;
                const r = 6;
                const x = Math.cos(t) * r;
                const z = Math.sin(t) * r;
                const y = (i / PARTICLE_COUNT * 30) - 15;
                return { x: x + rand(-1,1), y: y, z: z + rand(-1,1) };
            },
            // 5. WARP TUNNEL (New)
            (i) => {
                const angle = i * 0.1;
                const r = 6 + Math.random();
                const z = (i % 100) * 0.5 - 25; // Length
                return {
                    x: Math.cos(angle) * r,
                    y: Math.sin(angle) * r,
                    z: z
                };
            }
        ];
        
        const shapeNames = ["SPHERE", "QUANTUM CUBE", "TORUS", "NEON PYRAMID", "HELIX", "WARP TUNNEL"];
        let currentShapeIdx = 0;

        // Initial Generation
        for(let i=0; i<PARTICLE_COUNT; i++){
            const p = shapes[0](i);
            pos[i*3]=p.x; pos[i*3+1]=p.y; pos[i*3+2]=p.z;
            target[i*3]=p.x; target[i*3+1]=p.y; target[i*3+2]=p.z;
            
            const c = colorCyan.clone().lerp(colorPurple, Math.random());
            colors[i*3]=c.r; colors[i*3+1]=c.g; colors[i*3+2]=c.b;
            randoms[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geometry.setAttribute('positionTarget', new THREE.BufferAttribute(target, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uMorph: { value: 0 },
                uZoom: { value: 1.0 },
                uCharge: { value: 0.0 }
            },
            vertexShader: `
                uniform float uTime;
                uniform float uMorph;
                uniform float uZoom;
                uniform float uCharge;
                attribute vec3 positionTarget;
                attribute vec3 color;
                attribute float aRandom;
                varying vec3 vColor;
                void main() {
                    vColor = color + (uCharge * 0.6); 
                    vec3 p = mix(position, positionTarget, uMorph);
                    float noise = sin(uTime * 1.5 + p.y + aRandom * 5.0) * 0.15;
                    float jitter = sin(uTime * 50.0 + aRandom * 10.0) * uCharge * 0.3;
                    p += normal * (noise + jitter);
                    p *= uZoom;
                    vec4 mv = modelViewMatrix * vec4(p, 1.0);
                    gl_Position = projectionMatrix * mv;
                    gl_PointSize = (3.5 + aRandom * 2.0 + (uCharge*4.0)) * (20.0 / -mv.z);
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    float d = distance(gl_PointCoord, vec2(0.5));
                    if(d > 0.5) discard;
                    float alpha = 1.0 - smoothstep(0.3, 0.5, d);
                    gl_FragColor = vec4(vColor, alpha);
                }
            `,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- 3. LOGIC ---
        const state = {
            morphing: false, morphVal: 0,
            zoom: 1.0, targetZoom: 1.0,
            rot: { x: 0, y: 0 }, targetRot: { x: 0, y: 0 },
            fistHoldTime: 0, isFist: false, chargeLevel: 0
        };

        function updateParticleColors(idx) {
            // Change colors based on shape
            let c1, c2;
            if(idx === 1) { c1 = colorCyan; c2 = colorGreen; } // Cube: Tech
            else if (idx === 3) { c1 = colorGold; c2 = colorPurple; } // Pyramid: Alien
            else { c1 = colorCyan; c2 = colorPurple; } // Default

            const colorsAttr = geometry.attributes.color;
            for(let i=0; i<PARTICLE_COUNT; i++) {
                const c = c1.clone().lerp(c2, Math.random());
                colorsAttr.setXYZ(i, c.r, c.g, c.b);
            }
            colorsAttr.needsUpdate = true;
        }

        function switchShape() {
            if(state.morphing) return;
            state.morphing = true;
            state.morphVal = 0;
            currentShapeIdx = (currentShapeIdx + 1) % shapes.length;
            
            const shp = document.getElementById('ui-shape');
            shp.style.opacity = 0;
            setTimeout(() => { shp.innerText = shapeNames[currentShapeIdx]; shp.style.opacity = 1; }, 200);

            // Update Target Positions
            const gen = shapes[currentShapeIdx];
            const attr = geometry.attributes.positionTarget;
            for(let i=0; i<PARTICLE_COUNT; i++){
                const p = gen(i);
                attr.setXYZ(i, p.x, p.y, p.z);
            }
            attr.needsUpdate = true;
            
            // Subtle color shift
            updateParticleColors(currentShapeIdx);
        }

        // --- 4. INPUT ---
        const uiStatus = document.getElementById('ui-status');
        const uiDot = document.getElementById('status-dot');
        const gestureText = document.getElementById('gesture-text');
        const gesturePill = document.getElementById('gesture-pill');
        const chargeFill = document.getElementById('ui-charge');

        function setStatus(text, type) {
            uiStatus.innerText = text;
            uiDot.className = "status-light " + type;
        }

        let hands;
        async function setupAI() {
            hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            
            hands.onResults(results => {
                if(results.multiHandLandmarks.length > 0) {
                    setStatus("TARGET LOCKED", "active");
                    const lm = results.multiHandLandmarks[0];
                    
                    // Controls
                    state.targetRot.y = (lm[9].x - 0.5) * 5.0;
                    state.targetRot.x = (lm[9].y - 0.5) * 5.0;
                    const pinch = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);
                    state.targetZoom = 0.6 + (pinch * 4.0);

                    // Fist Logic
                    const tips = [8, 12, 16, 20];
                    let d = 0;
                    tips.forEach(i => d += Math.hypot(lm[i].x - lm[0].x, lm[i].y - lm[0].y));
                    
                    if((d/4) < 0.13) {
                        gestureText.innerText = "CHARGING...";
                        gesturePill.classList.add('active');
                        if(!state.isFist) { state.isFist = true; state.fistHoldTime = Date.now(); }
                        const dur = Date.now() - state.fistHoldTime;
                        state.chargeLevel = Math.min(dur / 1200, 1.0);
                        chargeFill.style.width = (state.chargeLevel * 100) + "%";

                        if(state.chargeLevel >= 1 && !state.morphing) {
                            switchShape();
                            state.fistHoldTime = Date.now() + 1000;
                            state.chargeLevel = 0;
                            chargeFill.style.width = "0%";
                            bloomPass.strength = 3.5; // Flash
                            setTimeout(() => bloomPass.strength = 1.4, 300);
                        }
                    } else {
                        state.isFist = false;
                        state.chargeLevel = Math.max(0, state.chargeLevel - 0.1);
                        chargeFill.style.width = (state.chargeLevel * 100) + "%";
                        gestureText.innerText = "TRACKING HAND";
                        gesturePill.classList.remove('active');
                    }
                } else {
                    setStatus("SCANNING...", "searching");
                    gestureText.innerText = "NO INPUT";
                    gesturePill.classList.remove('active');
                    state.targetRot.y += 0.0015;
                    state.targetRot.x *= 0.95;
                    state.chargeLevel = 0;
                    chargeFill.style.width = "0%";
                }
            });
        }

        // Start Handlers
        const btnStart = document.getElementById('btn-start');
        const startScreen = document.getElementById('start-screen');
        const video = document.getElementById('video-feed');

        function startGame(mode) {
            document.querySelector('.btn-group').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            if(mode === 'touch') {
                startTouchMode();
                return;
            }

            if (!window.isSecureContext && location.hostname !== 'localhost') {
                alert("HTTPS Required. Starting Touch Mode.");
                startTouchMode();
                return;
            }

            setupAI().then(async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 360 } } 
                    });
                    video.srcObject = stream;
                    await video.play();
                    
                    startScreen.style.opacity = 0;
                    setTimeout(() => startScreen.remove(), 600);
                    
                    async function aiLoop() {
                        if(video.readyState >= 2) await hands.send({image: video});
                        requestAnimationFrame(aiLoop);
                    }
                    aiLoop();
                } catch(e) {
                    alert("Camera Error: " + e.message);
                    startTouchMode();
                }
            });
        }

        function startTouchMode() {
            startScreen.style.opacity = 0;
            setTimeout(() => startScreen.remove(), 600);
            setStatus("TOUCH CONTROL", "active");
            gestureText.innerText = "DOUBLE TAP TO MORPH";
            
            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                state.targetRot.y = ((t.clientX / window.innerWidth) - 0.5) * 4.0;
                state.targetRot.x = ((t.clientY / window.innerHeight) - 0.5) * 4.0;
            });
            window.addEventListener('dblclick', () => {
                state.chargeLevel = 1; 
                switchShape();
                setTimeout(() => state.chargeLevel = 0, 300);
            });
        }

        document.getElementById('btn-start').addEventListener('click', () => startGame('cam'));
        document.getElementById('btn-touch').addEventListener('click', () => startGame('touch'));

        // --- 5. RENDER LOOP ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            state.rot.x += (state.targetRot.x - state.rot.x) * 0.1;
            state.rot.y += (state.targetRot.y - state.rot.y) * 0.1;
            particles.rotation.x = state.rot.x;
            particles.rotation.y = state.rot.y;
            state.zoom += (state.targetZoom - state.zoom) * 0.1;

            material.uniforms.uZoom.value = state.zoom;
            material.uniforms.uTime.value = time;
            material.uniforms.uCharge.value = state.chargeLevel;

            if(state.morphing) {
                state.morphVal += dt * 2.0;
                if(state.morphVal >= 1) {
                    state.morphVal = 0; state.morphing = false;
                    geometry.attributes.position.array.set(geometry.attributes.positionTarget.array);
                    geometry.attributes.position.needsUpdate = true;
                }
            }
            material.uniforms.uMorph.value = state.morphVal;

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
