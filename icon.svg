<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" /> 
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="#020617" />
  
  <circle cx="256" cy="256" r="180" fill="url(#brandGradient)" opacity="0.15" filter="url(#neonGlow)" />

  <g transform="translate(0, -20)">
    <path d="M216 340 V180 L160 236 L130 206 L256 80 L382 206 L352 236 L296 180 V340 Z" fill="url(#brandGradient)" filter="url(#neonGlow)"/>
